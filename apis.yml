apis:
  - aid: wave-mobile-money:wave-checkout-api
    name: Wave Checkout API
    description: >-
      Hosted payment session API for accepting one-off payments from Wave
      wallet users. Create a checkout session, redirect the customer to the
      returned wave_launch_url, then receive a checkout.session.completed
      webhook (or poll the session) once payment succeeds. Sessions support
      success_url / error_url redirects, client_reference for correlation,
      restrict_payer_mobile for phone-locked payments, and aggregated_merchant_id
      for PSPs operating on behalf of sub-merchants. Includes session
      retrieval, search by transaction_id or client_reference, refund, and
      explicit expire endpoints.
    humanURL: https://docs.wave.com/checkout
    baseURL: https://api.wave.com
    tags:
      - Checkout
      - Payments
      - Hosted Payment Page
    properties:
      - type: Documentation
        url: https://docs.wave.com/checkout
      - type: Documentation
        url: https://docs.wave.com/business
  - aid: wave-mobile-money:wave-payout-api
    name: Wave Payout API
    description: >-
      Programmatic disbursement API for sending money from a business wallet
      to individual Wave wallets, identified by E.164 mobile number. Supports
      single payouts, payout batches (submit many at once and poll batch
      status), payout reversal, payout lookup by id or client reference, and
      a verify_recipient pre-flight check. All POST requests require an
      Idempotency-Key header for safe retries. Used for bulk payroll, gig
      economy payouts, marketplace seller settlement, humanitarian cash
      transfer programs, and refunds out-of-band of the original payment.
    humanURL: https://docs.wave.com/payout
    baseURL: https://api.wave.com
    tags:
      - Payouts
      - Disbursements
      - Bulk Payments
    properties:
      - type: Documentation
        url: https://docs.wave.com/payout
      - type: Documentation
        url: https://docs.wave.com/business
  - aid: wave-mobile-money:wave-balance-reconciliation-api
    name: Wave Balance & Reconciliation API
    description: >-
      Read-side API for inspecting a business wallet's current balance and
      enumerating its transactions for accounting and reconciliation. GET
      /v1/balance returns the live wallet balance (optionally aggregated
      across subaccounts); GET /v1/transactions returns a paginated,
      time-ordered list of transactions for a given day; POST
      /v1/transactions/:id/refund reverses a received payment including any
      fees. Forward cursor pagination via first / after with a 1000-entry
      page threshold.
    humanURL: https://docs.wave.com/balance-api
    baseURL: https://api.wave.com
    tags:
      - Balance
      - Transactions
      - Reconciliation
      - Refunds
    properties:
      - type: Documentation
        url: https://docs.wave.com/balance-api
      - type: Documentation
        url: https://docs.wave.com/business
  - aid: wave-mobile-money:wave-aggregated-merchants-api
    name: Wave Aggregated Merchants API
    description: >-
      Sub-merchant management API for aggregators, payment service providers,
      and platforms that accept Wave payments on behalf of many downstream
      businesses. Full CRUD over aggregated merchant records — list, create,
      retrieve, update, delete — with the resulting aggregated_merchant_id
      attached to Checkout and Payout calls so that funds and reporting flow
      to the correct underlying merchant.
    humanURL: https://docs.wave.com/aggregated-merchants
    baseURL: https://api.wave.com
    tags:
      - Aggregators
      - PSP
      - Sub-Merchants
      - Marketplace
    properties:
      - type: Documentation
        url: https://docs.wave.com/aggregated-merchants
      - type: Documentation
        url: https://docs.wave.com/business
  - aid: wave-mobile-money:wave-webhooks
    name: Wave Webhooks
    description: >-
      Outbound event delivery channel for asynchronously notifying merchant
      systems when state changes on the Wave platform. Events include
      checkout.session.completed, checkout.session.payment_failed,
      b2b.payment_received, b2b.payment_failed, merchant.payment_received,
      and test.test_event for portal-triggered smoke tests. Every delivery
      carries a Wave-Signature header containing a Unix timestamp and one or
      more HMAC-SHA256 signatures over the raw body; receivers must validate
      the signature and reject deliveries older than five minutes to prevent
      replay. Event payloads use a Stripe-style envelope (id, type, data) and
      the id field should be used to enforce at-least-once-delivery
      idempotency.
    humanURL: https://docs.wave.com/webhook
    baseURL: https://api.wave.com
    tags:
      - Webhooks
      - Events
      - HMAC
      - Asynchronous
    properties:
      - type: Documentation
        url: https://docs.wave.com/webhook
      - type: Documentation
        url: https://docs.wave.com/business
