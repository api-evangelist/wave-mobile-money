aid: wave-mobile-money
name: Wave Mobile Money
description: >-
  Wave is a Dakar, Senegal-headquartered mobile money company on a mission to
  "make Africa the first cashless continent." Founded by Drew Durbin and
  Lincoln Quirk (who previously built the Sendwave remittance service) and
  publicly launched in Senegal in 2018, Wave provides a smartphone- and
  agent-based wallet that lets users deposit and withdraw cash for free and
  send money domestically for a flat 1% fee — roughly 70% cheaper than the
  telco-led mobile money incumbents in the region. Wave operates today in
  Senegal, Côte d'Ivoire, Uganda, Mali, Burkina Faso, and The Gambia, working
  through a dense network of human agents alongside the Wave app and a
  separate Wave Business portal for merchants and enterprises. In September
  2021, Wave raised a USD 200M Series A led by Sequoia Heritage, Founders
  Fund, Stripe, and Ribbit at a USD 1.7B valuation — the largest Series A
  ever raised on the African continent at the time. For developers, Wave
  exposes a tier-1 B2B platform via api.wave.com, documented at
  docs.wave.com, with Checkout (hosted payment sessions), Payout (single and
  batch disbursements, reversals, recipient verification), Balance &
  Reconciliation (wallet balance, transactions, refunds), Aggregated
  Merchants (sub-merchant management for aggregators and PSPs), and Webhooks
  with HMAC-SHA256 signing for asynchronous event delivery. API keys are
  scoped per-API, support IP allowlisting and optional request signing, and
  the platform enforces idempotency on POST mutations.
